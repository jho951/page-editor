name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint-type-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        env:
          VITE_GATEWAY_BASE_URL: https://api.example.com
          VITE_API_BASE_URL: https://api.example.com
          VITE_API_PROXY_TARGET: https://api.example.com
          VITE_DOCUMENTS_API_BASE_URL: https://api.example.com
          VITE_START_FRONTEND_URL: https://start.example.com
          VITE_SITE_URL: https://editor.example.com
          VITE_POST_AUTH_REDIRECT_URL: https://editor.example.com
          VITE_ENABLE_REMOTE_DOCS: "true"
        run: npm run build
