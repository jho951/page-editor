name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVICE_NAME: editor-page
  CD_PROFILE: ec2-compose
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
  HAS_EC2_DEPLOY_TARGET: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_SSH_KEY != '' }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'ec2-user' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
  DEPLOY_BUNDLE_DIR: ${{ vars.DEPLOY_BUNDLE_DIR || '/opt/deploy' }}
  HEALTH_URL: ${{ vars.HEALTH_URL || '' }}
  READY_URL: ${{ vars.READY_URL || '' }}

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_name }}" != "master" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main/master branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}
      latest_image_uri: ${{ steps.resolve.outputs.latest_image_uri }}
      repository: ${{ steps.resolve.outputs.repository }}
      registry: ${{ steps.resolve.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          repo="${ECR_REPOSITORY_NAME:-${{ needs.deploy-gate.outputs.deploy_environment }}-${SERVICE_NAME}}"
          image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:${GITHUB_SHA}"
          latest_image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:latest"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$latest_image_uri" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository
        shell: bash
        env:
          REPOSITORY_NAME: ${{ steps.resolve.outputs.repository }}
        run: |
          set -euo pipefail
          aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${REPOSITORY_NAME}" >/dev/null 2>&1 || \
            aws ecr create-repository --region "${AWS_REGION}" --repository-name "${REPOSITORY_NAME}" >/dev/null

      - name: Build and push image
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: ${{ steps.resolve.outputs.image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
          LATEST_IMAGE_URI: ${{ steps.resolve.outputs.latest_image_uri }}
          VITE_GATEWAY_BASE_URL: ${{ vars.VITE_GATEWAY_BASE_URL || 'https://api.myeditor.n-e.kr' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || vars.VITE_GATEWAY_BASE_URL || 'https://api.myeditor.n-e.kr' }}
          VITE_API_PROXY_TARGET: ${{ vars.VITE_API_PROXY_TARGET || vars.VITE_GATEWAY_BASE_URL || 'https://api.myeditor.n-e.kr' }}
          VITE_DOCUMENTS_API_BASE_URL: ${{ vars.VITE_DOCUMENTS_API_BASE_URL || vars.VITE_GATEWAY_BASE_URL || 'https://api.myeditor.n-e.kr' }}
          VITE_START_FRONTEND_URL: ${{ vars.VITE_START_FRONTEND_URL || 'https://myeditor.n-e.kr' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://editor.myeditor.n-e.kr' }}
          VITE_POST_AUTH_REDIRECT_URL: ${{ vars.VITE_POST_AUTH_REDIRECT_URL || vars.VITE_SITE_URL || 'https://editor.myeditor.n-e.kr' }}
          VITE_ENABLE_REMOTE_DOCS: ${{ vars.VITE_ENABLE_REMOTE_DOCS || 'true' }}
          VITE_PORT: ${{ vars.VITE_PORT || '5174' }}
        run: |
          set -euo pipefail
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.build.yml build editor
          docker push "${EDITOR_PAGE_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            docker tag "${EDITOR_PAGE_IMAGE}" "${LATEST_IMAGE_URI}"
            docker push "${LATEST_IMAGE_URI}"
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-editor-page:test
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml config >/tmp/editor-page-prod.yml

      - name: Setup SSH agent
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: ${{ needs.image.outputs.image_uri }}
          REGISTRY: ${{ needs.image.outputs.registry }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "AWS_REGION='${AWS_REGION}' REGISTRY='${REGISTRY}' EDITOR_PAGE_IMAGE='${EDITOR_PAGE_IMAGE}' DEPLOY_BUNDLE_DIR='${DEPLOY_BUNDLE_DIR}' bash -se" <<'EOF'
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"
          cd "${DEPLOY_BUNDLE_DIR}"
          test -f .env.frontend
          sed -i "s|^EDITOR_PAGE_IMAGE=.*$|EDITOR_PAGE_IMAGE=${EDITOR_PAGE_IMAGE}|" .env.frontend
          ./scripts/deploy-stack.sh up
          EOF

      - name: Fallback deploy command
        if: ${{ env.HAS_EC2_DEPLOY_TARGET != 'true' && env.DEPLOY_COMMAND != '' }}
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: ${{ needs.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          eval "${DEPLOY_COMMAND}"

      - name: Skip deploy
        if: ${{ env.HAS_EC2_DEPLOY_TARGET != 'true' && env.DEPLOY_COMMAND == '' }}
        shell: bash
        run: echo "No EC2 deploy target or DEPLOY_COMMAND configured; image publish and compose validation completed."

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ] && [ -z "${DEPLOY_COMMAND}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          if [ -z "${HEALTH_URL}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ] && [ -z "${DEPLOY_COMMAND}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          if [ -z "${READY_URL}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
