name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVICE_NAME: editor-page
  CD_PROFILE: ec2-compose
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
  HEALTH_URL: ${{ vars.HEALTH_URL || '' }}
  READY_URL: ${{ vars.READY_URL || '' }}

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_name }}" != "master" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main/master branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}
      latest_image_uri: ${{ steps.resolve.outputs.latest_image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          repo="${ECR_REPOSITORY_NAME:-${{ needs.deploy-gate.outputs.deploy_environment }}-${SERVICE_NAME}}"
          image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:${GITHUB_SHA}"
          latest_image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:latest"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$latest_image_uri" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: ${{ steps.resolve.outputs.image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
          LATEST_IMAGE_URI: ${{ steps.resolve.outputs.latest_image_uri }}
          VITE_GATEWAY_BASE_URL: ${{ vars.VITE_GATEWAY_BASE_URL || 'https://api.example.com' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || vars.VITE_GATEWAY_BASE_URL || 'https://api.example.com' }}
          VITE_API_PROXY_TARGET: ${{ vars.VITE_API_PROXY_TARGET || vars.VITE_GATEWAY_BASE_URL || 'https://api.example.com' }}
          VITE_DOCUMENTS_API_BASE_URL: ${{ vars.VITE_DOCUMENTS_API_BASE_URL || vars.VITE_GATEWAY_BASE_URL || 'https://api.example.com' }}
          VITE_START_FRONTEND_URL: ${{ vars.VITE_START_FRONTEND_URL || 'https://start.example.com' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || 'https://editor.example.com' }}
          VITE_POST_AUTH_REDIRECT_URL: ${{ vars.VITE_POST_AUTH_REDIRECT_URL || vars.VITE_SITE_URL || 'https://editor.example.com' }}
          VITE_ENABLE_REMOTE_DOCS: ${{ vars.VITE_ENABLE_REMOTE_DOCS || 'true' }}
          VITE_PORT: ${{ vars.VITE_PORT || '5174' }}
        run: |
          set -euo pipefail
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.build.yml build editor
          docker push "${EDITOR_PAGE_IMAGE}"
          if [ "${PUBLISH_LATEST}" = "true" ]; then
            docker tag "${EDITOR_PAGE_IMAGE}" "${LATEST_IMAGE_URI}"
            docker push "${LATEST_IMAGE_URI}"
          fi

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-editor-page:test
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml config >/tmp/editor-page-prod.yml

      - name: Deploy
        shell: bash
        env:
          EDITOR_PAGE_IMAGE: ${{ needs.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_COMMAND}" ]; then
            eval "${DEPLOY_COMMAND}"
          else
            echo "DEPLOY_COMMAND secret is not configured; image publish and compose validation completed."
          fi

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_COMMAND}" ] || [ -z "${HEALTH_URL}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_COMMAND}" ] || [ -z "${READY_URL}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
