services:
  editor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-http://localhost:8080}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://localhost:8080}
        VITE_DOCUMENTS_API_BASE_URL: ${VITE_DOCUMENTS_API_BASE_URL:-http://localhost:8080}
        VITE_START_FRONTEND_URL: ${VITE_START_FRONTEND_URL:-http://localhost:5173}
        VITE_SITE_URL: ${VITE_SITE_URL:-http://localhost:5173}
        VITE_ENABLE_REMOTE_DOCS: ${VITE_ENABLE_REMOTE_DOCS:-true}
        VITE_PORT: ${VITE_PORT:-5173}
